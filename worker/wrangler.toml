name = "block-dodge-parry-report-widget"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[vars]
GITHUB_OWNER = "renanstigliani"
GITHUB_REPO = "block-dodge-parry-srd"
ISSUE_LABEL = "reader-feedback"
ALLOWED_ORIGIN = "https://renanstigliani.github.io"

# Secrets — set with `wrangler secret put <NAME>`, never committed here:
#   GITHUB_TOKEN           fine-grained PAT, scoped to this repo only, Issues: Read and write
#   TURNSTILE_SECRET_KEY   from the Cloudflare Turnstile widget you create

# Optional: uncomment to enable IP-based rate limiting via Workers KV.
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "replace-with-kv-namespace-id"
