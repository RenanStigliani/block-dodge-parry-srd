title: "Block, Dodge, Parry"
description: "A levelless, classless expansion of Cairn — System Reference Document (SRD). Unofficial community mirror."
remote_theme: just-the-docs/just-the-docs

url: "https://renanstigliani.github.io"
baseurl: "/block-dodge-parry-srd"

permalink: pretty
color_scheme: dark
encoding: UTF-8

search_enabled: true
heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

plugins:
  - jekyll-remote-theme
  - jekyll-redirect-from
  - jekyll-sitemap
  - jekyll-include-cache

aux_links:
  "Original site":
    - "https://blockdodgeparry.com/"
  "Itch.io":
    - "https://dicegoblingames.itch.io/block-dodge-parry"

footer_content: 'Content by <a href="https://dicegoblin.blog/">Lars Huijbregts / Dice Goblin Games</a>, licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/">CC-BY-SA 4.0</a>. This is an unofficial community mirror of the <a href="https://blockdodgeparry.com/">Block, Dodge, Parry SRD</a>.'

# jekyll-remote-theme fetches theme assets; keep build output tidy.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - LICENSE
  - scrape.py
